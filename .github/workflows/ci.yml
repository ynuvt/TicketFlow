name: TicketFlow CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: 1. Verify & Typecheck Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Generate Prisma Client (Backend)
        run: |
          cd apps/backend
          npx prisma generate

      - name: Typecheck Frontend
        run: |
          cd apps/frontend
          npx tsc --noEmit

      - name: Typecheck Backend
        run: |
          cd apps/backend
          npx tsc --noEmit

      - name: Build Monorepo Apps
        run: npm run build

  deploy-frontend:
    name: 2. Deploy Frontend (Cloudflare Pages)
    needs: verify
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies & Build Frontend
        run: |
          npm ci
          cd apps/frontend
          npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            npx wrangler pages deploy apps/frontend/dist --project-name=ticketflow-frontend
          else
            echo "Cloudflare secrets not set, skipping frontend deployment."
          fi

  deploy-backend:
    name: 3. Deploy Backend (Render)
    needs: verify
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set, skipping backend trigger."
          fi
